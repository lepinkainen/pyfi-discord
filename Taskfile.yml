version: "3"

dotenv:
  - .env
  - "{{.ENV}}/.env."
  - "{{.HOME}}/.env"

tasks:
  build:
    desc: Build the application
    cmds:
      - pnpm build

  deploy:files:
    desc: Copy necessary files to server
    cmds:
      - rsync -avz --delete --exclude 'node_modules' --exclude '.git' --exclude '*.pdf' dist data package.json pnpm-lock.yaml pnpm-workspace.yaml deploy.sh ecosystem.config.js .env {{.DEPLOY_SERVER_USER}}@{{.DEPLOY_SERVER_HOST}}:{{.DEPLOY_PATH}}

  deploy:install:
    desc: Install production dependencies on server
    cmds:
      - ssh {{.DEPLOY_SERVER_USER}}@{{.DEPLOY_SERVER_HOST}} "cd {{.DEPLOY_PATH}} && pnpm install --prod --frozen-lockfile && chmod +x deploy.sh"

  deploy:restart:
    desc: Reload the application (zero-downtime)
    cmds:
      - ssh {{.DEPLOY_SERVER_USER}}@{{.DEPLOY_SERVER_HOST}} "cd {{.DEPLOY_PATH}} && ./deploy.sh"

  deploy:
    desc: Deploy the application
    deps: [build]
    cmds:
      - task: deploy:files
      - task: deploy:install
      - task: deploy:restart
